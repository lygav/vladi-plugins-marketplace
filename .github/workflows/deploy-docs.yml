name: Deploy docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['plugins/squad-federation-core/docs/**']

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install and build
        working-directory: plugins/squad-federation-core/docs
        run: npm ci && npx astro build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: plugins/squad-federation-core/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
